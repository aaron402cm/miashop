<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MiaShop - Acceso Administrativo</title>
  <!-- Google Fonts: Spectral (Estilo mágico/serif) e Inter (SaaS limpio) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <!-- Tailwind CSS para layouts responsivos estructurados -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Identity Services (GIS) para el login seguro -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <style>
    /* Configuración de fuentes */
    .font-magic { font-family: 'Spectral', serif; }
    .font-sans-clean { font-family: 'Inter', sans-serif; }

    /* Fondo Pastel Mágico con Animación de Movimiento */
    body {
      background: linear-gradient(-45deg, #fce4ec, #f3e5f5, #e8eaf6, #e1f5fe);
      background-size: 400% 400%;
      animation: magicalGlow 15s ease infinite;
      overflow: hidden;
    }

    @keyframes magicalGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Partículas de destellos de fondo */
    .sparkle {
      position: absolute;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.6;
      animation: floatSparkle 8s infinite linear;
    }

    @keyframes floatSparkle {
      0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
    }

    /* Glassmorphism para la tarjeta principal */
    .glass-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.4);
      box-shadow: 0 20px 40px rgba(125, 90, 148, 0.1);
    }

    /* Brillo mágico al enfocar inputs */
    .input-magic:focus {
      border-color: #F2846B;
      box-shadow: 0 0 12px rgba(242, 132, 107, 0.4);
      outline: none;
    }

    /* Animación de Transición de Pantallas */
    .screen-transition {
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body class="font-sans-clean min-h-screen flex items-center justify-center relative px-4">

  <!-- Capa de destellos mágicos animados -->
  <div id="sparkle-container" class="absolute inset-0 z-0 overflow-hidden"></div>

  <!-- Tarjeta de Login Principal -->
  <div class="glass-card w-full max-w-md rounded-2xl p-8 z-10 text-center relative overflow-hidden screen-transition" id="auth-card">
    
    <!-- Decoración visual dorada/mágica superior -->
    <div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-[#F2846B] via-[#D4AF37] to-[#7d5a94]"></div>

    <!-- Header / Logo -->
    <div class="mb-6">
      <div class="flex justify-center mb-3">
        <!-- Reemplazar src con la URL de tu imagen procesada si lo deseas -->
        <img id="logo" src="https://drive.google.com/file/d/18gUt5Y7CiwuTT4OsGIhDzRm_GlKWk3Ub/view?usp=sharing" 
             alt="MiaShop Logo" class="h-16 w-auto object-contain drop-shadow-md">
      </div>
      <h1 class="font-magic text-3xl font-semibold text-[#7d5a94] tracking-wide">MiaShop</h1>
      <p class="text-sm text-gray-500 italic mt-1">El portal mágico de tus importaciones</p>
    </div>

    <!-- PANTALLA 1: ACCESO CON GOOGLE -->
    <div id="screen-login" class="screen-transition opacity-100 block">
      <p class="text-gray-600 mb-6 text-sm">Por favor, inicia sesión con tu cuenta de Google autorizada para acceder al panel de control.</p>
      
      <!-- Entrada manual de simulación de correo o integración directa -->
      <div class="mb-4">
        <input type="email" id="user-email" placeholder="Introduce tu correo de Google" 
               class="w-full px-4 py-3 rounded-xl border border-gray-200 input-magic text-center text-sm transition-all"
               value="miashop.retail.peru@gmail.com" readonly>
      </div>

      <!-- Botón de Acción Principal (Estilo Mágico Rosa/Coral con animación) -->
      <button onclick="solicitarAcceso()" id="btn-login"
              class="w-full bg-gradient-to-r from-[#F2846B] to-[#7d5a94] text-white font-medium py-3 px-6 rounded-xl hover:shadow-lg transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200">
        ✨ Lanzar Hechizo de Acceso (Iniciar)
      </button>
    </div>

    <!-- PANTALLA 2: SEGUNDO FACTOR DE AUTENTICACIÓN (2FA OTP) -->
    <div id="screen-otp" class="screen-transition opacity-0 hidden">
      <div class="mb-4 text-center">
        <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-purple-100 text-[#7d5a94] mb-3">
          <span class="text-xl">🔮</span>
        </div>
        <p class="text-gray-600 text-sm">Hemos enviado un código de verificación a tu correo de administradora. Ingrésalo a continuación para continuar.</p>
      </div>

      <!-- Input de OTP mágico con espaciado amplio -->
      <div class="mb-6">
        <input type="text" id="otp-input" placeholder="· · · · · ·" maxlength="6"
               class="w-full px-4 py-4 rounded-xl border border-gray-200 input-magic text-center text-2xl font-bold tracking-widest text-[#7d5a94] transition-all">
      </div>

      <div class="space-y-3">
        <button onclick="procesarVerificacionOTP()" id="btn-verify"
                class="w-full bg-[#7d5a94] text-white font-medium py-3 px-6 rounded-xl hover:bg-[#68497d] hover:shadow-lg transform hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200">
          🔑 Verificar Código
        </button>
        <button onclick="regresarAlLogin()" class="text-xs text-gray-500 hover:text-[#F2846B] underline block mx-auto transition-colors">
          Regresar
        </button>
      </div>
    </div>

    <!-- Mensajes de Estado / Notificaciones -->
    <div id="status-message" class="mt-4 text-xs font-medium hidden"></div>

  </div>

  <script>
    // Generar partículas mágicas de fondo al cargar la página
    function createSparkles() {
      const container = document.getElementById('sparkle-container');
      const count = 15;
      for (let i = 0; i < count; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.style.left = Math.random() * 100 + 'vw';
        sparkle.style.width = sparkle.style.height = (Math.random() * 6 + 4) + 'px';
        sparkle.style.animationDelay = (Math.random() * 8) + 's';
        sparkle.style.animationDuration = (Math.random() * 6 + 6) + 's';
        container.appendChild(sparkle);
      }
    }
    createSparkles();

    // Mostrar mensajes en la interfaz
    function showMessage(text, isError = false) {
      const msgDiv = document.getElementById('status-message');
      msgDiv.innerText = text;
      msgDiv.className = `mt-4 text-xs font-medium ${isError ? 'text-red-500' : 'text-emerald-600'} block`;
    }

    // Petición al Backend para iniciar login y disparar OTP
    function solicitarAcceso() {
      const email = document.getElementById('user-email').value;
      const btn = document.getElementById('btn-login');
      
      btn.disabled = true;
      btn.innerText = "🪄 Invocando código...";
      showMessage("Verificando credenciales y enviando código...");

      google.script.run
        .withSuccessHandler(function(response) {
          btn.disabled = false;
          btn.innerText = "✨ Lanzar Hechizo de Acceso (Iniciar)";
          
          if (response.success) {
            showMessage(response.message);
            // Animación de transición hacia la pantalla 2FA (OTP)
            transitionToScreen('screen-login', 'screen-otp');
          }
        })
        .withFailureHandler(function(error) {
          btn.disabled = false;
          btn.innerText = "✨ Lanzar Hechizo de Acceso (Iniciar)";
          showMessage(error.message, true);
        })
        .iniciarAutenticacion(email);
    }

    // Petición al Backend para comprobar el código OTP
    function procesarVerificacionOTP() {
      const code = document.getElementById('otp-input').value.trim();
      const btn = document.getElementById('btn-verify');

      if (code.length < 6) {
        showMessage("Por favor, ingresa los 6 dígitos.", true);
        return;
      }

      btn.disabled = true;
      btn.innerText = "🪄 Rompiendo sello...";

      google.script.run
        .withSuccessHandler(function(response) {
          btn.disabled = false;
          btn.innerText = "🔑 Verificar Código";
          
          if (response.success) {
            showMessage("¡Acceso mágico concedido! Redirigiendo...", false);
            // Guardamos el token simulado de sesión en el cliente
            sessionStorage.setItem('mia_session_token', response.token);
            
            // Aquí termina la Fase 1. El redireccionamiento o apertura de panel se gestionará en la Fase 3.
            alert("¡Éxito! Lograste ingresar al sistema de manera segura. (Fase 1 completada con éxito)");
          }
        })
        .withFailureHandler(function(error) {
          btn.disabled = false;
          btn.innerText = "🔑 Verificar Código";
          showMessage(error.message, true);
        })
        .verificarOTP(code);
    }

    // Control de transiciones animadas
    function transitionToScreen(fromId, toId) {
      const fromEl = document.getElementById(fromId);
      const toEl = document.getElementById(toId);

      fromEl.classList.add('opacity-0');
      setTimeout(() => {
        fromEl.classList.add('hidden');
        fromEl.classList.remove('block');
        
        toEl.classList.remove('hidden');
        toEl.classList.add('block');
        setTimeout(() => {
          toEl.classList.remove('opacity-0');
          toEl.classList.add('opacity-100');
        }, 50);
      }, 300);
    }

    function regresarAlLogin() {
      transitionToScreen('screen-otp', 'screen-login');
      document.getElementById('status-message').classList.add('hidden');
    }
  </script>
</body>
</html>
