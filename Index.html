<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MiaShop - Acceso Mágico</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(135deg, #FFF0ED 0%, #FFE5E0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }
    h1, h2, .magic-title { font-family: 'Cinzel', serif; }
    .magic-card {
      box-shadow: 0 15px 35px rgba(245, 135, 110, 0.12), 0 0 20px rgba(197, 160, 89, 0.15);
      border: 1px solid rgba(197, 160, 89, 0.25);
      background-color: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(8px);
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #C5A059;
      border-radius: 50%;
      pointer-events: none;
      animation: fly 9s infinite linear;
      opacity: 0.5;
    }
    @keyframes fly {
      0% { transform: translateY(100vh) translateX(0) scale(1); opacity: 0; }
      50% { opacity: 0.7; }
      100% { transform: translateY(-10vh) translateX(40px) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Partículas Místicas -->
  <div class="sparkle" style="left: 8%; animation-delay: 0s;"></div>
  <div class="sparkle" style="left: 25%; animation-delay: 2.5s; width: 6px; height: 6px;"></div>
  <div class="sparkle" style="left: 65%; animation-delay: 4.5s;"></div>
  <div class="sparkle" style="left: 88%; animation-delay: 1.2s; width: 5px; height: 5px;"></div>

  <!-- Botón Flotante para Control de Música -->
  <button id="btnMusica" onclick="alternarMusica()" class="fixed top-4 right-4 z-50 bg-[#F5876E] hover:bg-[#e2735b] text-white p-3 rounded-full shadow-lg flex items-center justify-center transition-all duration-300">
    <span id="musicIcon" class="text-xl">🪄</span>
    <span id="musicText" class="text-xs ml-1 font-semibold max-w-0 overflow-hidden whitespace-nowrap transition-all duration-500 ease-in-out md:max-w-xs">Activar Magia</span>
  </button>

  <div class="w-full max-w-md p-6 mx-4">
    <div class="magic-card rounded-3xl p-8 text-center relative overflow-hidden" id="cardContainer">
      <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-[#C5A059] via-[#F5876E] to-[#C5A059]"></div>

      <div class="flex justify-center mb-6">
        <div class="relative">
          <div class="w-28 h-28 flex items-center justify-center rounded-full bg-transparent p-1">
            <img id="logoMiaShop" src="https://i.ibb.co/L5w2Hsc/image.png" alt="MiaShop Logo" class="object-contain w-full h-full">
          </div>
          <div class="absolute inset-0 bg-red-200 rounded-full mix-blend-multiply filter blur-xl opacity-25 animate-pulse"></div>
        </div>
      </div>

      <h1 class="text-2xl font-bold text-gray-800 mb-1 tracking-wider">MiaShop</h1>
      <p class="text-xs text-[#C5A059] font-semibold tracking-widest mb-6 uppercase magic-title">Consola de Control</p>

      <!-- PASO 1 -->
      <div id="stepEmail" class="transition-all duration-500 block">
        <div class="mb-6 text-left">
          <label for="correoAdmin" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Llave de Identidad (Correo)</label>
          <input type="email" id="correoAdmin" placeholder="tu-correo@gmail.com" required
                 class="w-full px-4 py-3 border border-gray-200 rounded-2xl focus:border-[#F5876E] focus:outline-none transition-all duration-300 bg-gray-50 text-center text-gray-700">
        </div>
        <button onclick="enviarSolicitudCorreo()" id="btnEnviarCorreo"
                class="w-full bg-[#F5876E] hover:bg-[#e2735b] text-white py-4 rounded-2xl font-semibold shadow-md hover:shadow-lg transition-all duration-300">
          Invocar Código de Acceso ⚡
        </button>
      </div>

      <!-- PASO 2 -->
      <div id="step2FA" class="hidden transition-all duration-500">
        <div class="mb-6">
          <label for="codigo2fa" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Introduce el Código Mágico enviado</label>
          <input type="text" id="codigo2fa" placeholder="0 0 0 0 0 0" maxlength="6" 
                 class="w-full text-center text-3xl tracking-[0.5em] font-bold py-3 border border-gray-200 rounded-2xl focus:border-[#F5876E] focus:outline-none transition-all duration-300 bg-gray-50 text-gray-800">
          <p class="text-[11px] text-[#C5A059] mt-2 italic font-serif">Revisa la bandeja de entrada de tu correo.</p>
        </div>
        <button onclick="validarCodigo2FA()" id="btnValidar2fa"
                class="w-full bg-[#C5A059] hover:bg-[#b08d4b] text-white py-4 rounded-2xl font-semibold shadow-md hover:shadow-lg transition-all duration-300 tracking-wider uppercase text-sm">
          Revelar Andén de Entrada 🔮
        </button>
        <button onclick="volverAlPasoUno()" class="text-xs text-gray-400 hover:text-gray-600 underline mt-4 block mx-auto">Cambiar de correo</button>
      </div>

      <div id="loading" class="hidden my-8">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#F5876E] mx-auto"></div>
        <p class="text-xs text-gray-400 mt-4 italic font-serif">Invocando el hechizo de autenticación...</p>
      </div>

      <div id="statusMessage" class="hidden mt-6 p-4 rounded-2xl text-xs font-medium"></div>
    </div>
  </div>

  <audio id="musicaFondo" loop preload="auto">
    <source src="https://ia801309.us.archive.org/28/items/HarryPotterThemeSong/Harry%20Potter%20Theme%20Song.mp3" type="audio/mpeg">
  </audio>
  <audio id="sonidoExito" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/magic-chime-01.mp3" type="audio/mpeg">
  </audio>

  <script>
    // 🔔 AQUÍ COLOCAS LA URL (GAS_) DE TU APP SCRIPT DE GOOGLE SHEETS
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyfI10LCstUdJ0spkL_mV0fMnuBD0QyECv9ck-2-KPDPGxLUHNnYkfCayrGmJteSD3bMA/exec";

    const musica = document.getElementById('musicaFondo');
    const sonidoExito = document.getElementById('sonidoExito');
    let musicaIniciada = false;

    musica.volume = 0.20;
    sonidoExito.volume = 0.40;

    document.body.addEventListener('click', () => {
      if (!musicaIniciada) { reproducirMusicaDeFondo(); }
    }, { once: true });

    function alternarMusica() {
      if (musica.paused) {
        reproducirMusicaDeFondo();
      } else {
        musica.pause();
        document.getElementById('musicIcon').innerText = '🔇';
        document.getElementById('musicText').innerText = 'Magia Pausada';
      }
    }

    function reproducirMusicaDeFondo() {
      musica.play().then(() => {
        musicaIniciada = true;
        document.getElementById('musicIcon').innerText = '🔮';
        document.getElementById('musicText').innerText = 'Hechizo Activo';
      }).catch(err => { console.log("Se requiere interacción para reproducir."); });
    }

    /**
     * Comunicación HTTP POST con tu Google Sheet en lugar de google.script.run
     */
    function enviarSolicitudCorreo() {
      const email = document.getElementById('correoAdmin').value.trim();
      if (!email) {
        mostrarMensaje("Por favor, introduce tu correo administrador.", "error");
        return;
      }

      mostrarCarga(true);
      mostrarMensaje("", "limpiar");

      // Usamos fetch para conectar GitHub con tu Apps Script
      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors", // Evita problemas de CORS preflight en navegadores
        body: JSON.stringify({ accion: "solicitarCodigo", email: email })
      })
      .then(() => {
        // Al usar "no-cors", el navegador no nos deja leer la respuesta por seguridad,
        // pero la petición sí llega y ejecuta el envío del correo en tu Apps Script.
        mostrarCarga(false);
        document.getElementById('stepEmail').classList.add('hidden');
        document.getElementById('step2FA').classList.remove('hidden');
        mostrarMensaje("Si el correo es correcto, recibirás el código en un instante.", "exito");
      })
      .catch(err => {
        mostrarCarga(false);
        mostrarMensaje("Error de conexión con el servidor místico.", "error");
      });
    }

    function validarCodigo2FA() {
      const codigo = document.getElementById('codigo2fa').value.trim();
      if (codigo.length < 6) {
        mostrarMensaje("El código debe tener exactamente 6 dígitos.", "error");
        return;
      }

      mostrarCarga(true);
      mostrarMensaje("", "limpiar");

      // Para validar el código sí necesitamos leer la respuesta (CORS estándar).
      // El doPost del backend ya tiene las cabeceras CORS configuradas.
      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ accion: "verificarCodigo", codigo: codigo })
      })
      .then(res => res.json())
      .then(resultado => {
        mostrarCarga(false);
        if (resultado.exito) {
          musica.pause();
          sonidoExito.play();
          mostrarMensaje(resultado.mensaje, "exito");
          
          const card = document.getElementById('cardContainer');
          card.style.transform = "scale(0.9) translateY(-30px)";
          card.style.opacity = "0";

          setTimeout(() => {
            alert("🧙‍♂️ ¡Hechizo correcto! Has cruzado exitosamente el andén de MiaShop.");
          }, 1000);
        } else {
          mostrarMensaje(resultado.mensaje, "error");
        }
      })
      .catch(err => {
        mostrarCarga(false);
        mostrarMensaje("Código incorrecto o error de comunicación.", "error");
      });
    }

    function volverAlPasoUno() {
      document.getElementById('step2FA').classList.add('hidden');
      document.getElementById('stepEmail').classList.remove('hidden');
      mostrarMensaje("", "limpiar");
    }

    function mostrarCarga(mostrar) {
      if (mostrar) {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('stepEmail').classList.add('pointer-events-none', 'opacity-50');
        document.getElementById('step2FA').classList.add('pointer-events-none', 'opacity-50');
      } else {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('stepEmail').classList.remove('pointer-events-none', 'opacity-50');
        document.getElementById('step2FA').classList.remove('pointer-events-none', 'opacity-50');
      }
    }

    function mostrarMensaje(texto, tipo) {
      const div = document.getElementById('statusMessage');
      if (tipo === "limpiar") {
        div.classList.add('hidden');
        return;
      }
      div.innerText = texto;
      div.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'border-red-200', 'bg-green-50', 'text-green-700', 'border-green-200');
      if (tipo === "error") {
        div.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
      } else if (tipo === "exito") {
        div.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
      }
    }
  </script>
</body>
</html>
