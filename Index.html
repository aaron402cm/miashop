<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>MiaShop - Acceso Mágico</title>
  <!-- Google Fonts para estilo Harry Potter Profesional -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <!-- TailwindCSS para diseño rápido y responsive -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Identity Services para Login con Google -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      font-family: 'Montserrat', sans-serif;
      /* Fondo rosa pastel inspirado en la marca MiaShop */
      background: linear-gradient(135deg, #FFF0ED 0%, #FFE5E0 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }
    
    h1, h2, .magic-title {
      font-family: 'Cinzel', serif;
    }

    /* Brillo mágico dorado en contenedores */
    .magic-card {
      box-shadow: 0 10px 30px rgba(245, 135, 110, 0.15), 0 0 15px rgba(197, 160, 89, 0.2);
      border: 1px solid rgba(197, 160, 89, 0.3);
      background-color: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      transition: all 0.5s ease;
    }

    /* Partículas o estrellas flotantes místicas */
    .sparkle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #C5A059;
      border-radius: 50%;
      pointer-events: none;
      animation: fly 8s infinite linear;
      opacity: 0.6;
    }

    @keyframes fly {
      0% { transform: translateY(100vh) translateX(0) scale(1); opacity: 0; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-10vh) translateX(50px) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Elementos de Fondo Mágico -->
  <div class="sparkle" style="left: 10%; animation-delay: 0s;"></div>
  <div class="sparkle" style="left: 30%; animation-delay: 2s; width: 6px; height: 6px;"></div>
  <div class="sparkle" style="left: 70%; animation-delay: 4s;"></div>
  <div class="sparkle" style="left: 85%; animation-delay: 1s; width: 5px; height: 5px;"></div>

  <!-- Botón de Control de Música/Magia -->
  <button id="btnMusica" onclick="alternarMusica()" class="fixed top-4 right-4 z-50 bg-[#F5876E] hover:bg-[#e2735b] text-white p-3 rounded-full shadow-lg flex items-center justify-center transition-all duration-300">
    <span id="musicIcon" class="text-xl">🪄</span>
    <span id="musicText" class="text-xs ml-1 font-semibold max-w-0 overflow-hidden whitespace-nowrap transition-all duration-500 ease-in-out md:max-w-xs">Activar Magia</span>
  </button>

  <!-- Contenedor Principal (SaaS UX Mobile-First) -->
  <div class="w-full max-w-md p-6 mx-4">
    
    <div class="magic-card rounded-2xl p-8 text-center relative overflow-hidden" id="cardContainer">
      
      <!-- Detalle Dorado Superior -->
      <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-[#C5A059] via-[#F5876E] to-[#C5A059]"></div>

      <!-- Logotipo de la Empresa (MiaShop) -->
      <div class="flex justify-center mb-6">
        <div class="relative">
          <!-- Placeholder visual del logo de la empresa -->
          <div class="w-32 h-32 flex items-center justify-center rounded-full bg-transparent p-2">
            <!-- NOTA: Reemplazar el src con la URL directa de la imagen del logo una vez se aloje en un servidor o Drive público -->
            <img id="logoMiaShop" src="https://i.ibb.co/68032X0/miashop-logo.png" alt="MiaShop Logo" class="object-contain w-full h-full max-h-24">
          </div>
          <!-- Destello Místico detrás del Logo -->
          <div class="absolute inset-0 bg-pink-200 rounded-full mix-blend-multiply filter blur-xl opacity-30 animate-pulse"></div>
        </div>
      </div>

      <h1 class="text-2xl font-bold text-gray-800 mb-2">MiaShop Admin</h1>
      <p class="text-sm text-gray-500 mb-8" id="stepDescription">Identifícate mediante el portal para cruzar el andén.</p>

      <!-- PASO 1: LOGIN CON GOOGLE -->
      <div id="stepGoogle" class="transition-all duration-500 ease-in-out block">
        <div class="flex justify-center my-6">
          <!-- Botón de Google Identity Services -->
          <div id="g_id_onload"
               data-client_id="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
               data-context="signin"
               data-ux_mode="popup"
               data-callback="alRecibirRespuestaGoogle"
               data-auto_prompt="false">
          </div>
          <div class="g_id_signin"
               data-type="standard"
               data-shape="pill"
               data-theme="outline"
               data-text="signin_with"
               data-size="large"
               data-logo_alignment="left">
          </div>
        </div>
        <p class="text-xs text-gray-400 mt-4">Acceso exclusivo para el personal autorizado de MiaShop.</p>
      </div>

      <!-- PASO 2: VERIFICACIÓN 2FA (Oculto inicialmente) -->
      <div id="step2FA" class="hidden transition-all duration-500 ease-in-out">
        <div class="mb-6">
          <label for="codigo2fa" class="block text-sm font-semibold text-gray-700 mb-2 magic-title">Hechizo de Verificación (2FA)</label>
          <input type="text" id="codigo2fa" placeholder="000000" maxlength="6" 
                 class="w-full text-center text-2xl tracking-widest font-bold py-3 border-2 border-gray-200 rounded-xl focus:border-[#F5876E] focus:outline-none transition-all duration-300 bg-gray-50">
          <p class="text-xs text-gray-400 mt-2">Hemos enviado el código a tu correo.</p>
        </div>

        <button onclick="validarCodigoEnServidor()" id="btnValidar2fa"
                class="w-full bg-[#F5876E] text-white py-3 rounded-xl font-semibold shadow-md hover:bg-[#e2735b] hover:shadow-lg transition-all duration-300">
          Desbloquear Acceso ⚡
        </button>
      </div>

      <!-- Spinner / Carga Mística -->
      <div id="loading" class="hidden my-8">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-[#F5876E] mx-auto"></div>
        <p class="text-sm text-gray-500 mt-4 italic font-serif">Invocando el hechizo de acceso...</p>
      </div>

      <!-- Mensajes de Error / Éxito -->
      <div id="statusMessage" class="hidden mt-6 p-3 rounded-xl text-xs font-semibold"></div>

    </div>
  </div>

  <!-- ELEMENTOS DE AUDIO -->
  <!-- Música de fondo temática de Harry Potter -->
  <audio id="musicaFondo" loop preload="auto">
    <source src="https://beckyspyblog.wordpress.com/wp-content/uploads/2018/02/bbcs-proms-hedwigs-theme-from-harry-potter1.mp3" type="audio/mpeg">
  </audio>
  <!-- Efecto de sonido de éxito (Campana o Chime mágico) -->
  <audio id="sonidoExito" preload="auto">
    <source src="https://www.soundjay.com/misc/sounds/magic-chime-01.mp3" type="audio/mpeg">
  </audio>

  <!-- LÓGICA DE CLIENTE (JS) -->
  <script>
    const musica = document.getElementById('musicaFondo');
    const sonidoExito = document.getElementById('sonidoExito');
    let musicaIniciada = false;

    // Ajustamos volumen para que sea sutil de fondo
    musica.volume = 0.25;
    sonidoExito.volume = 0.4;

    /**
     * Inicia la música automáticamente cuando el usuario toca la pantalla por primera vez
     */
    document.body.addEventListener('click', () => {
      if (!musicaIniciada) {
        activarMagiaMusica();
      }
    }, { once: true });

    function alternarMusica() {
      if (musica.paused) {
        activarMagiaMusica();
      } else {
        musica.pause();
        document.getElementById('musicIcon').innerText = '🔇';
        document.getElementById('musicText').innerText = 'Magia Desactivada';
      }
    }

    function activarMagiaMusica() {
      musica.play().then(() => {
        musicaIniciada = true;
        document.getElementById('musicIcon').innerText = '🔮';
        document.getElementById('musicText').innerText = 'Hechizo Activo';
      }).catch(e => {
        console.log("Esperando interacción del usuario para reproducir audio.");
      });
    }

    /**
     * Callback de Google cuando el usuario completa el Login en el Pop-up
     */
    function alRecibirRespuestaGoogle(response) {
      mostrarCarga(true);
      mostrarMensaje("", "limpiar");
      
      // Enviar el token recibido de Google al backend en GAS
      google.script.run
        .withSuccessHandler(function(resultado) {
          mostrarCarga(false);
          if (resultado.exito) {
            // Cambiar dinámicamente al paso de 2FA
            document.getElementById('stepGoogle').classList.add('hidden');
            document.getElementById('step2FA').classList.remove('hidden');
            document.getElementById('stepDescription').innerText = "Introduce el código mágico enviado a tu correo.";
            mostrarMensaje("Autenticado con Google. Ingresa el código enviado a tu correo.", "exito");
          } else {
            mostrarMensaje(resultado.mensaje, "error");
          }
        })
        .withFailureHandler(function(err) {
          mostrarCarga(false);
          mostrarMensaje("Error al conectar con la torre de control.", "error");
        })
        .verificarAutenticacionGoogle(response.credential);
    }

    /**
     * Valida el código 2FA ingresado
     */
    function validarCodigoEnServidor() {
      const codigo = document.getElementById('codigo2fa').value.trim();
      
      if (codigo.length < 6) {
        mostrarMensaje("El código debe tener 6 dígitos.", "error");
        return;
      }
      
      mostrarCarga(true);
      mostrarMensaje("", "limpiar");

      google.script.run
        .withSuccessHandler(function(resultado) {
          mostrarCarga(false);
          if (resultado.exito) {
            // Detener música de fondo
            musica.pause();
            // Tocar sonido mágico de éxito
            sonidoExito.play();
            
            mostrarMensaje(resultado.mensaje, "exito");
            
            // Efecto visual de transición mágica antes de ingresar
            const card = document.getElementById('cardContainer');
            card.style.transform = "scale(0.9) translateY(-20px)";
            card.style.opacity = "0";
            
            setTimeout(() => {
              // Avisar al usuario que ya entró (Próximamente Fase 3: Dashboard Base)
              alert("¡Acceso correcto! Has ingresado al panel de MiaShop.");
            }, 1000);

          } else {
            mostrarMensaje(resultado.mensaje, "error");
          }
        })
        .withFailureHandler(function(err) {
          mostrarCarga(false);
          mostrarMensaje("Error de conexión durante la validación.", "error");
        })
        .verificarCodigo2FA(codigo);
    }

    // Funciones Auxiliares UI
    function mostrarCarga(mostrar) {
      if (mostrar) {
        document.getElementById('loading').classList.remove('hidden');
        document.getElementById('stepGoogle').classList.add('pointer-events-none', 'opacity-50');
        document.getElementById('step2FA').classList.add('pointer-events-none', 'opacity-50');
      } else {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('stepGoogle').classList.remove('pointer-events-none', 'opacity-50');
        document.getElementById('step2FA').classList.remove('pointer-events-none', 'opacity-50');
      }
    }

    function mostrarMensaje(texto, tipo) {
      const div = document.getElementById('statusMessage');
      if (tipo === "limpiar") {
        div.classList.add('hidden');
        return;
      }
      
      div.innerText = texto;
      div.classList.remove('hidden', 'bg-red-100', 'text-red-700', 'bg-green-100', 'text-green-700');
      
      if (tipo === "error") {
        div.classList.add('bg-red-100', 'text-red-700');
      } else if (tipo === "exito") {
        div.classList.add('bg-green-100', 'text-green-700');
      }
    }
  </script>
</body>
</html>
